apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: portainer
  namespace: portainer
spec:
  interval: 15m
  chart:
    spec:
      chart: portainer
      version: "239.1.0"
      sourceRef:
        kind: HelmRepository
        name: portainer
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    service:
      type: ClusterIP
    ingress:
      enabled: true
      annotations:
        cert-manager.io/cluster-issuer: selfsigned-issuer
      hosts:
        - host: portainer.k3s.home
          paths:
            - path: "/"
      tls:
        - secretName: portainer-k3s-home-tls
          hosts:
            - portainer.k3s.home