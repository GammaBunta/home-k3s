apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: weave-gitops
  namespace: flux-operator
spec:
  interval: 15m
  chart:
    spec:
      chart: weave-gitops
      version: "4.*"
      sourceRef:
        kind: HelmRepository
        name: weave-gitops
        namespace: flux-system
  install:
    createNamespace: true
    timeout: 5m
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    adminUser:
      create: true
      username: admin
      # bcrypt hash de "admin" - à changer après premier accès
      passwordHash: "$2a$10$P.ZWuHQFEv3kBNXHYfU0NeL.kVe0BaZPirWZWjW/xjz5qlJ.H19Zy"
    ingress:
      enabled: true
      className: traefik
      annotations:
        cert-manager.io/cluster-issuer: selfsigned-issuer
      hosts:
        - host: flux.k3s.home
          paths:
            - path: /
              pathType: Prefix
      tls:
        - secretName: flux-k3s-home-tls
          hosts:
            - flux.k3s.home
