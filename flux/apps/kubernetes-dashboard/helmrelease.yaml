apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kubernetes-dashboard
  namespace: kubernetes-dashboard
spec:
  interval: 15m
  chart:
    spec:
      chart: kubernetes-dashboard
      version: "7.*"
      sourceRef:
        kind: HelmRepository
        name: kubernetes-dashboard
        namespace: flux-system
  install:
    createNamespace: true
    timeout: 10m
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    # On a déjà nginx (traefik) et cert-manager installés
    nginx:
      enabled: false
    cert-manager:
      enabled: false
    app:
      ingress:
        enabled: true
        hosts:
          - dashboard.k3s.home
        ingressClassName: traefik
        annotations:
          cert-manager.io/cluster-issuer: selfsigned-issuer
        tls:
          enabled: true
          secretName: dashboard-k3s-home-tls
