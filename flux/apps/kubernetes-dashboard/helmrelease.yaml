apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: kubernetes-dashboard
spec:
  interval: 15m
  chart:
    spec:
      chart: headlamp
      version: "0.*"
      sourceRef:
        kind: HelmRepository
        name: headlamp
        namespace: flux-system
  install:
    createNamespace: true
    timeout: 5m
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    ingress:
      enabled: true
      ingressClassName: traefik
      annotations:
        cert-manager.io/cluster-issuer: selfsigned-issuer
      hosts:
        - host: dashboard.k3s.home
          paths:
            - path: /
              pathType: Prefix
      tls:
        - secretName: dashboard-k3s-home-tls
          hosts:
            - dashboard.k3s.home
