apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: postgresql-cluster
  namespace: flux-system
spec:
  interval: 10m
  path: ./flux/apps/postgresql
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: cnpg
  wait: true
  timeout: 5m
