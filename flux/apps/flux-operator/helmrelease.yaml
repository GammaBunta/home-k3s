apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flux-operator
  namespace: flux-operator
spec:
  interval: 15m
  chart:
    spec:
      chart: flux-operator
      version: "0.*"
      sourceRef:
        kind: HelmRepository
        name: controlplaneio
        namespace: flux-system
  install:
    createNamespace: true
    timeout: 5m
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    ingress:
      enabled: true
      className: traefik
      annotations:
        cert-manager.io/cluster-issuer: selfsigned-issuer
      hosts:
        - host: flux.k3s.home
          paths:
            - path: /
              pathType: Prefix
      tls:
        - secretName: flux-k3s-home-tls
          hosts:
            - flux.k3s.home
