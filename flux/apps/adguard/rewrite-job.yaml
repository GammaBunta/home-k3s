apiVersion: batch/v1
kind: Job
metadata:
  name: adguard-bootstrap-rewrites
  namespace: adguard
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: setup
          image: curlimages/curl:8.8.0
          env:
            - name: ADGUARD_USER
              valueFrom:
                secretKeyRef:
                  name: adguard-admin
                  key: username
            - name: ADGUARD_PASS
              valueFrom:
                secretKeyRef:
                  name: adguard-admin
                  key: password
            - name: MASTER_IP
              valueFrom:
                configMapKeyRef:
                  name: adguard-settings
                  key: masterIp
          command:
            - /bin/sh
            - -c
            - |
              set -e
              until curl -sf http://adguard-home:3000/control/install/get_addresses >/dev/null; do
                echo "Attente AdGuard setup API..."
                sleep 5
              done

              curl -sf -X POST http://adguard-home:3000/control/install/configure \
                -H "Content-Type: application/json" \
                -d "{\"web\":{\"ip\":\"0.0.0.0\",\"port\":3080},\"dns\":{\"ip\":\"0.0.0.0\",\"port\":53},\"username\":\"${ADGUARD_USER}\",\"password\":\"${ADGUARD_PASS}\"}" || true

              sleep 5

              curl -sf -u "${ADGUARD_USER}:${ADGUARD_PASS}" \
                -X POST "http://adguard-home:3080/control/rewrite/add" \
                -H "Content-Type: application/json" \
                -d "{\"domain\":\"*.k3s.home\",\"answer\":\"${MASTER_IP}\"}" || true