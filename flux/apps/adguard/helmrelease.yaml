apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: adguard-home
  namespace: adguard
spec:
  interval: 15m
  chart:
    spec:
      chart: adguardhome
      version: "0.1.13"
      sourceRef:
        kind: HelmRepository
        name: adguardhome
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    fullnameOverride: adguard-home
    persistence:
      enabled: true
      storageClass: longhorn
      size: 8Gi
    service:
      type: LoadBalancer
    ingress:
      enabled: true
      className: traefik
      annotations:
        cert-manager.io/cluster-issuer: selfsigned-issuer
      hosts:
        - host: adguard.k3s.home
          paths:
            - path: /
              pathType: Prefix
      tls:
        - secretName: adguard-k3s-home-tls
          hosts:
            - adguard.k3s.home