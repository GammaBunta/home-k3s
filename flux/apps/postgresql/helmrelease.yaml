apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: postgresql
  namespace: postgresql
spec:
  interval: 15m
  chartRef:
    kind: OCIRepository
    name: postgresql
    namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    global:
      imageRegistry: ghcr.io
    auth:
      existingSecret: postgresql-secret
      secretKeys:
        adminPasswordKey: postgres-password

    primary:
      persistence:
        enabled: true
        storageClass: nfs-nas
        size: 10Gi

      nodeSelector:
        kubernetes.io/hostname: k3s-master
