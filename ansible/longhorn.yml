---
# ==========================================
# 1. Prepare ALL nodes
# ==========================================
- name: Prepare nodes for Longhorn
  hosts: k3s_cluster
  become: yes
  tasks:
    - name: Install open-iscsi and nfs-common (required by Longhorn)
      apt:
        name:
          - open-iscsi
          - nfs-common
        state: present
        update_cache: yes

    - name: Enable and start iscsid service
      systemd:
        name: iscsid
        enabled: yes
        state: started

# ==========================================
# 2. Deploy via Helm (includes Ingress)
# ==========================================
- name: Deploy Longhorn via Helm
  hosts: master
  become: yes
  tasks:
    - name: Deploy Longhorn HelmChart
      template:
        src: templates/longhorn-helm.yaml.j2
        dest: /tmp/longhorn-helm.yaml

    - name: Apply Longhorn HelmChart
      shell: k3s kubectl apply -f /tmp/longhorn-helm.yaml

    - name: Wait for Longhorn manager to be ready
      shell: k3s kubectl -n longhorn-system wait --for=condition=ready pod -l app=longhorn-manager --timeout=300s
      register: lh_wait
      retries: 5
      delay: 15
      until: lh_wait.rc == 0

    - name: Remove local-path as default storage class
      shell: >-
        k3s kubectl patch storageclass local-path -p
        '{"metadata": {"annotations":{"storageclass.kubernetes.io/is-default-class":"false"}}}'
      ignore_errors: yes