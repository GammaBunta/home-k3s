[master]
192.168.1.104 ansible_user=ubuntu

[workers]
192.168.1.105 ansible_user=ubuntu
192.168.1.106 ansible_user=ubuntu

[agent]
192.168.1.120 ansible_user=ubuntu

[k3s_cluster:children]
master
workers

[k3s_cluster:vars]
ansible_become=yes
ansible_become_method=sudo
ansible_ssh_common_args='-o StrictHostKeyChecking=no'

[agent:vars]
ansible_become=yes
ansible_become_method=sudo
ansible_ssh_common_args='-o StrictHostKeyChecking=no'