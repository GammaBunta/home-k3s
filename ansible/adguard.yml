---
- name: Deploy AdGuard Home as local DNS server
  hosts: master
  become: yes
  vars_files:
    - vault.yml
  vars:
    master_ip: "192.168.1.104"
    adguard_web_port: 3080
    dns_rewrites:
      - { domain: "longhorn.home.local", answer: "192.168.1.104" }
      - { domain: "adguard.home.local", answer: "192.168.1.104" }
      - { domain: "portainer.home.local", answer: "192.168.1.104" }
  tasks:
    - name: Create AdGuard Home namespace
      shell: k3s kubectl create namespace adguard --dry-run=client -o yaml | k3s kubectl apply -f -

    - name: Deploy AdGuard Home manifest
      copy:
        dest: /tmp/adguard.yaml
        content: |
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: adguard-data
            namespace: adguard
          spec:
            accessModes: ["ReadWriteOnce"]
            storageClassName: longhorn
            resources:
              requests:
                storage: 1Gi
          ---
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: adguard-home
            namespace: adguard
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: adguard-home
            strategy:
              type: Recreate
            template:
              metadata:
                labels:
                  app: adguard-home
              spec:
                hostNetwork: true
                dnsPolicy: ClusterFirstWithHostNet
                nodeSelector:
                  kubernetes.io/hostname: k3s-master
                containers:
                - name: adguard-home
                  image: adguard/adguardhome:latest
                  volumeMounts:
                  - name: data
                    mountPath: /opt/adguardhome/work
                    subPath: work
                  - name: data
                    mountPath: /opt/adguardhome/conf
                    subPath: conf
                volumes:
                - name: data
                  persistentVolumeClaim:
                    claimName: adguard-data

    - name: Apply AdGuard Home manifest
      shell: k3s kubectl apply -f /tmp/adguard.yaml

    - name: Wait for AdGuard Home pod to be ready
      shell: k3s kubectl -n adguard wait --for=condition=ready pod -l app=adguard-home --timeout=60s
      register: pod_wait
      retries: 3
      delay: 10
      until: pod_wait.rc == 0

    - name: Wait for setup wizard to be available
      uri:
        url: "http://127.0.0.1:3000/control/install/get_addresses"
        method: GET
        status_code: [200]
      register: setup_check
      retries: 12
      delay: 5
      until: setup_check.status == 200
      ignore_errors: yes

    - name: Complete AdGuard Home setup wizard
      uri:
        url: "http://127.0.0.1:3000/control/install/configure"
        method: POST
        body_format: json
        body:
          web:
            ip: "0.0.0.0"
            port: "{{ adguard_web_port }}"
          dns:
            ip: "{{ master_ip }}"
            port: 53
          username: "{{ adguard_user }}"
          password: "{{ adguard_pass }}"
        status_code: [200]
      register: setup_result
      ignore_errors: yes

    - name: Wait for AdGuard to restart after setup
      pause:
        seconds: 5

    - name: Add DNS rewrites
      uri:
        url: "http://127.0.0.1:{{ adguard_web_port }}/control/rewrite/add"
        method: POST
        body_format: json
        body:
          domain: "{{ item.domain }}"
          answer: "{{ item.answer }}"
        url_username: "{{ adguard_user }}"
        url_password: "{{ adguard_pass }}"
        force_basic_auth: yes
        status_code: [200]
      loop: "{{ dns_rewrites }}"
      ignore_errors: yes
