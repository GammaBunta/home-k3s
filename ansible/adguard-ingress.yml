---
- name: Expose AdGuard Home with Ingress and SSL certificate
  hosts: master
  become: yes
  vars:
    adguard_web_port: 3080
  tasks:
    - name: Create AdGuard Ingress manifest
      copy:
        dest: /tmp/adguard-ingress.yaml
        content: |
          apiVersion: v1
          kind: Service
          metadata:
            name: adguard-web
            namespace: adguard
          spec:
            type: ClusterIP
            selector:
              app: adguard-home
            ports:
            - name: http
              port: 80
              targetPort: {{ adguard_web_port }}
          ---
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: adguard-ingress
            namespace: adguard
            annotations:
              cert-manager.io/cluster-issuer: selfsigned-issuer
          spec:
            tls:
            - hosts:
              - adguard.home.local
              secretName: adguard-tls
            rules:
            - host: adguard.home.local
              http:
                paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: adguard-web
                      port:
                        number: 80

    - name: Apply AdGuard Ingress
      shell: k3s kubectl apply -f /tmp/adguard-ingress.yaml
