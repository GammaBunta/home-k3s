---
- name: Déploiement de Tailscale
  hosts: k3s_cluster
  become: true
  roles:
    - tailscale

- name: Configuration du Master K3s
  hosts: master
  become: true
  roles:
    - k3s_master

- name: Injection des secrets Kubernetes
  hosts: master
  become: true
  roles:
    - k3s_secrets

- name: Installation des dépendances NFS sur tous les noeuds k3s
  hosts: k3s_cluster
  become: true
  tasks:
    - name: Installer nfs-common
      apt:
        name: nfs-common
        state: present
        update_cache: true

- name: Configuration des Workers K3s
  hosts: workers
  become: true
  roles:
    - k3s_workers

- name: Configuration de la VM Agent (CI/CD)
  hosts: agent
  become: true
  roles:
    - agent