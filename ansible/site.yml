---
- name: Déploiement de Tailscale
  hosts: k3s_cluster
  become: true
  roles:
    - tailscale

- name: Configuration du Master K3s
  hosts: master
  become: true
  roles:
    - k3s_master

- name: Injection des secrets Kubernetes
  hosts: master
  become: true
  roles:
    - k3s_secrets

- name: Configuration des Workers K3s
  hosts: workers
  become: true
  roles:
    - k3s_workers

- name: Configuration de la VM Agent (CI/CD)
  hosts: agent
  become: true
  roles:
    - agent